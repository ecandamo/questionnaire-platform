<!-- Card: Font families -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.card{border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;min-height:160px;display:flex;flex-direction:column;gap:8px}
.card .k{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-700)}
.card .name{font-size:22px;font-weight:700;letter-spacing:-.01em;color:var(--navy-700)}
.card .glyphs{flex:1;display:flex;align-items:flex-end;font-size:42px;line-height:1;letter-spacing:-.02em;color:var(--fg)}
.card .meta{font-size:11px;color:var(--fg-subtle);font-family:var(--font-mono)}
.c1 .glyphs,.c1 .name{font-family:var(--font-display)}
.c2 .glyphs,.c2 .name{font-family:var(--font-docs)}
.c3 .glyphs,.c3 .name{font-family:var(--font-mono)}
.sub{color:var(--fg-subtle);font-size:11.5px;font-style:italic;font-family:var(--font-sans)}
</style></head><body>
<div class="grid">
  <div class="card c1">
    <span class="k">Display / UI</span>
    <div class="name">Mulish</div>
    <span class="sub">Approved · replaces Sailec</span>
    <div class="glyphs">Aa Bb 42</div>
    <span class="meta">300 · 400 · 600 · 800</span>
  </div>
  <div class="card c2">
    <span class="k">Documents</span>
    <div class="name">Questrial</div>
    <span class="sub">Approved · replaces Century Gothic</span>
    <div class="glyphs">Aa Bb 42</div>
    <span class="meta">400 · PPT + Word</span>
  </div>
  <div class="card c3">
    <span class="k">Monospace</span>
    <div class="name">JetBrains Mono</div>
    <span class="sub">data · IDs · code</span>
    <div class="glyphs">01 AB</div>
    <span class="meta">400 · 500</span>
  </div>
</div>
</body></html>
