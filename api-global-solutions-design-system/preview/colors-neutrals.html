<!-- Card: Neutrals -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:#fff;color:var(--fg)}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
.chip{height:68px;display:flex;align-items:flex-end;padding:8px;font-size:11px;font-weight:600}
.meta{padding:6px 8px;background:#fff;font-size:10.5px;line-height:1.3}
.meta b{display:block;font-weight:700;font-size:11px}
.meta span{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px}
h4{margin:0 0 10px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-700)}
</style></head><body>
<h4>Neutrals — Ink Ramp (navy-tinted)</h4>
<div class="row">
  <div class="sw"><div class="chip" style="background:#F7F8FB;color:#11151E">50</div><div class="meta"><b>Ink 50</b><span>#F7F8FB</span></div></div>
  <div class="sw"><div class="chip" style="background:#EEF0F5;color:#11151E">100</div><div class="meta"><b>Ink 100</b><span>#EEF0F5</span></div></div>
  <div class="sw"><div class="chip" style="background:#D4D9E1;color:#11151E">200 ●</div><div class="meta"><b>Ink 200</b><span>#D4D9E1</span></div></div>
  <div class="sw"><div class="chip" style="background:#8C95A6;color:#fff">400</div><div class="meta"><b>Ink 400</b><span>#8C95A6</span></div></div>
  <div class="sw"><div class="chip" style="background:#3F4754;color:#fff">700</div><div class="meta"><b>Ink 700</b><span>#3F4754</span></div></div>
  <div class="sw"><div class="chip" style="background:#11151E;color:#fff">900</div><div class="meta"><b>Ink 900</b><span>#11151E</span></div></div>
</div>
</body></html>
