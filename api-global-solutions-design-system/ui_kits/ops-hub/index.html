<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>API Ops Hub — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; height:100%; }
  body { font-family: var(--font-sans); color: var(--fg); background: #F7F8FB; }
  *, *::before, *::after { box-sizing: border-box; }
  /* tiny tailwind-like subset we need; actual utility classes provided by tailwindcss CDN below */
</style>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Mulish','Sailec','ui-sans-serif','system-ui','sans-serif'],
          mono: ['JetBrains Mono','ui-monospace','monospace'],
        }
      }
    }
  }
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="font-sans">
<div id="root"></div>

<script type="text/babel" src="Core.jsx"></script>
<script type="text/babel" src="Overview.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
  const { useState } = React;
  function App() {
    const [active, setActive] = useState(localStorage.getItem('api_active') || 'Overview');
    const pick = (n) => { setActive(n); localStorage.setItem('api_active', n); };
    const titleMap = {
      'Overview': { t:'Crew accommodations overview', s:'Week of May 12, 2026' },
      'Sourcing': { t:'Property sourcing', s:'12,483 properties in catalog' },
      'Crew lodging': { t:'Crew lodging', s:'Today · 47 crews across 12 airlines' },
      'Ground transport': { t:'Ground transport', s:'284 transfers planned' },
      'IROPS': { t:'IROPS response', s:'Live ops console' },
      'Billing': { t:'Billing &amp; reconciliation', s:'April 2026 cycle' },
      'Reporting': { t:'Reporting', s:'Custom dashboards' },
    };
    const screen = active === 'Overview' ? <OverviewScreen/>
      : active === 'IROPS' ? <IROPSScreen/>
      : active === 'Billing' ? <BillingScreen/>
      : <div className="p-10 text-center text-[#8C95A6] text-sm">Screen stub — not part of this UI kit demo.</div>;

    return (
      <div className="flex h-screen bg-[#F7F8FB]">
        <Sidebar active={active} setActive={pick}/>
        <main className="flex-1 flex flex-col overflow-auto">
          <Topbar title={titleMap[active].t} subtitle={titleMap[active].s}/>
          {screen}
        </main>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
