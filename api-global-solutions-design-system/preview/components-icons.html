<!-- Card: Iconography set -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg)}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px}
.ico{aspect-ratio:1;border:1px solid #EEF0F5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#273B6E;background:#fff}
.ico svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
h4{margin:0 0 10px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-700)}
p{margin:12px 0 0;font-size:11.5px;color:var(--fg-subtle);line-height:1.4}
</style></head><body>
<h4>Iconography — Lucide, 2px stroke, round caps</h4>
<div class="grid">
  <div class="ico" title="plane"><svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 10-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg></div>
  <div class="ico" title="hotel"><svg viewBox="0 0 24 24"><path d="M3 21V8l9-5 9 5v13M3 21h18M9 21v-7h6v7"/></svg></div>

  <div class="ico" title="clock"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>

  <div class="ico" title="bus"><svg viewBox="0 0 24 24"><path d="M8 6v6M16 6v6M2 12h19.5M18 18.5V20a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1M8 19v1a1 1 0 01-1 1H6a1 1 0 01-1-1v-1.5M4 6h14a2 2 0 012 2v9a2 2 0 01-2 2H6a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg></div>

  <div class="ico" title="chart"><svg viewBox="0 0 24 24"><path d="M3 3v18h18M7 14l4-4 4 4 6-6"/></svg></div>
</div>
<p>Icons are 20×20 Lucide-style glyphs at 2px stroke weight with round line-caps. Load the full set from the Lucide CDN in production: <code class="api">lucide-react ^0.577</code></p>
</body></html>
