<!-- Card: Display typography -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.stack{display:flex;flex-direction:column;gap:6px}
.spec{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px dashed var(--border)}
.spec:last-child{border:none}
.label{width:130px;flex-shrink:0;font-size:10.5px;font-family:var(--font-mono);color:var(--fg-subtle);letter-spacing:.02em}
.label b{display:block;color:var(--fg);font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.sample{flex:1;color:var(--navy-700)}
</style></head><body>
<div class="stack">
  <div class="spec"><div class="label"><b>Display XL</b>76 / 1.1 / -0.02em</div><div class="sample" style="font-family:var(--font-display);font-weight:800;font-size:56px;letter-spacing:-.02em;line-height:1.05">Crew, housed.</div></div>
  <div class="spec"><div class="label"><b>Display</b>48 / 1.1 / -0.02em</div><div class="sample" style="font-family:var(--font-display);font-weight:800;font-size:38px;letter-spacing:-.02em;line-height:1.08">Global hotel ops, at scale</div></div>
  <div class="spec"><div class="label"><b>H1</b>38 / 1.1</div><div class="sample" style="font-family:var(--font-display);font-weight:700;font-size:28px;line-height:1.15">Sourcing &amp; planning</div></div>
  <div class="spec"><div class="label"><b>H2</b>30 / 1.25</div><div class="sample" style="font-family:var(--font-display);font-weight:700;font-size:22px;line-height:1.2;color:var(--fg)">IROPS response playbooks</div></div>
</div>
</body></html>
