<!-- Card: Sidebar nav -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:14px;background:#F7F8FB;font-family:var(--font-sans);color:var(--fg)}
.nav{display:flex;gap:14px}
.side{width:220px;background:#0B1428;color:#fff;border-radius:12px;padding:14px 10px;min-height:250px}
.brand{display:flex;align-items:center;gap:8px;padding:4px 8px 14px}
.brand img{height:22px}
.item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s}
.item:hover{background:rgba(255,255,255,.06);color:#fff}
.item.active{background:#273B6E;color:#fff}
.item.active .ico{color:#78BC43}
.ico{width:16px;height:16px;color:rgba(255,255,255,.55);flex-shrink:0}
.ico svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sec{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);margin:14px 10px 6px}
.note{flex:1;display:flex;align-items:center;justify-content:center;color:var(--fg-subtle);font-size:12px;font-style:italic;border:1px dashed var(--border-strong);border-radius:12px}
</style></head><body>
<div class="nav">
  <nav class="side">
    <div class="brand"><img src="../assets/api-logo-white.svg"></div>
    <div class="item active"><span class="ico"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10"/></svg></span>Overview</div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><path d="M3 21V8l9-5 9 5v13M3 21h18M9 21v-7h6v7"/></svg></span>Sourcing</div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><path d="M2 9v11M22 20V13a4 4 0 00-4-4H2"/></svg></span>Crew lodging</div>
    <div class="sec">Operations</div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86z"/><path d="M12 9v4M12 17h.01"/></svg></span>IROPS</div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg></span>Billing</div>
  </nav>
  <div class="note">Navy sidebar · accent "+" green on active state</div>
</div>
</body></html>
