<!-- Card: Buttons -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 16px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;border:1px solid transparent;cursor:pointer;transition:all .18s}
.btn:hover{transform:translateY(-1px)}
.primary{background:#273B6E;color:#fff}
.primary:hover{background:#1F3160}
.accent{background:#78BC43;color:#0B1428}
.accent:hover{background:#61A331}
.outline{background:#fff;color:#273B6E;border-color:#D4D9E1}
.outline:hover{border-color:#273B6E;background:#F7F8FB}
.ghost{background:transparent;color:#273B6E}
.ghost:hover{background:#EEF1F8}
.danger{background:#fff;color:#C6342C;border-color:#F4C7C4}
.sm{height:30px;padding:0 12px;font-size:12.5px;border-radius:6px}
.lg{height:46px;padding:0 20px;font-size:15px}
.ico{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
h4{margin:0 0 10px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-700)}
</style></head><body>
<h4>Buttons</h4>
<div class="row">
  <button class="btn primary">Confirm rooming list<svg class="ico" viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
  <button class="btn accent">+ New booking</button>
  <button class="btn outline">Filter</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn danger">Release block</button>
</div>
<div class="row">
  <button class="btn primary sm">Small</button>
  <button class="btn primary">Default</button>
  <button class="btn primary lg">Large</button>
  <button class="btn outline sm">Export CSV</button>
  <button class="btn outline sm">⋯</button>
</div>
</body></html>
