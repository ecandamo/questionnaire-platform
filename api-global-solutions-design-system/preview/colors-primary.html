<!-- Card: Brand Colors - Primary -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:#fff;color:var(--fg)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
.chip{height:78px;display:flex;align-items:flex-end;padding:10px;font-size:11px;font-weight:600;color:#fff;letter-spacing:.02em}
.meta{padding:8px 10px;background:#fff;font-size:11px;line-height:1.35}
.meta b{display:block;color:var(--fg);font-weight:700;font-size:12px}
.meta span{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10.5px}
h4{margin:0 0 10px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-700)}
</style></head><body>
<h4>Primary — Navy Ramp</h4>
<div class="row">
  <div class="sw"><div class="chip" style="background:#D9DFEE;color:#11151E">100</div><div class="meta"><b>Navy 100</b><span>#D9DFEE</span></div></div>
  <div class="sw"><div class="chip" style="background:#8592BE">300</div><div class="meta"><b>Navy 300</b><span>#8592BE</span></div></div>
  <div class="sw"><div class="chip" style="background:#273B6E">500 ● Brand</div><div class="meta"><b>Navy 500</b><span>#273B6E</span></div></div>
  <div class="sw"><div class="chip" style="background:#18264B">700</div><div class="meta"><b>Navy 700</b><span>#18264B</span></div></div>
  <div class="sw"><div class="chip" style="background:#0B1428">900</div><div class="meta"><b>Navy 900</b><span>#0B1428</span></div></div>
</div>
</body></html>
