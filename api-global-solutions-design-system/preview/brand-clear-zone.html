<!-- Card: Logo clear zone -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:#fff}
.stage{position:relative;background:var(--ink-50);border:1px dashed var(--border-strong);border-radius:var(--radius-md);padding:40px;display:flex;align-items:center;justify-content:center;min-height:160px}
.logo-box{position:relative;padding:22px}
.logo-box img{height:54px;display:block}
.logo-box::before{content:"";position:absolute;inset:0;border:1.5px dashed #78BC43;border-radius:4px}
.tag{position:absolute;top:-10px;left:10px;background:#fff;padding:0 8px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-700)}
.plus-h{position:absolute;right:-18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:2px}
.plus-h span{color:var(--green-700);font-weight:300;font-size:18px;line-height:1}
.plus-h small{font-size:9px;color:var(--fg-subtle);letter-spacing:.08em}
.caption{margin-top:12px;font-size:12px;color:var(--fg-muted);line-height:1.4}
</style></head><body>
<div class="stage">
  <div class="logo-box">
    <span class="tag">Clear zone</span>
    <img src="../assets/api-logo-navy.svg" alt="API">
    <div class="plus-h"><span>+</span><small>×1</small></div>
  </div>
</div>
<p class="caption">Use the height of the "+" inside the logo as the minimum margin on all four sides.</p>
</body></html>
