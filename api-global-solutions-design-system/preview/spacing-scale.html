<!-- Card: Spacing scale -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg)}
.row{display:flex;align-items:center;gap:12px;padding:4px 0;border-bottom:1px dashed var(--border)}
.row:last-child{border:none}
.k{width:70px;font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)}
.k b{color:var(--fg);font-family:var(--font-sans);font-weight:700}
.bar{background:var(--green-500);height:10px;border-radius:2px}
.px{margin-left:8px;font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)}
h4{margin:0 0 10px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-700)}
</style></head><body>
<h4>Spacing Scale — 4px base</h4>
<div class="row"><div class="k"><b>1</b></div><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
<div class="row"><div class="k"><b>2</b></div><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
<div class="row"><div class="k"><b>3</b></div><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
<div class="row"><div class="k"><b>4</b></div><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
<div class="row"><div class="k"><b>6</b></div><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
<div class="row"><div class="k"><b>8</b></div><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
<div class="row"><div class="k"><b>12</b></div><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
<div class="row"><div class="k"><b>16</b></div><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
</body></html>
