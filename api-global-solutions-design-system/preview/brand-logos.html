<!-- Card: Brand logos -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:0;font-family:var(--font-sans);background:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;height:220px}
.tile{display:flex;align-items:center;justify-content:center;position:relative;padding:24px}
.tile img{max-width:70%;max-height:70%;display:block}
.tile .lbl{position:absolute;bottom:10px;left:12px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.a{background:#fff;border:1px solid var(--border)}
.b{background:#273B6E}
.c{background:#78BC43}
.a .lbl{color:var(--fg-subtle)}
.b .lbl,.c .lbl{color:#fff;opacity:.75}
</style></head><body>
<div class="grid">
  <div class="tile a"><img src="../assets/api-logo-navy.svg"><span class="lbl">Navy on white</span></div>
  <div class="tile b"><img src="../assets/api-logo-white.svg"><span class="lbl">White on navy</span></div>
  <div class="tile c"><img src="../assets/api-logo-white.svg"><span class="lbl">White on green</span></div>
</div>
</body></html>
