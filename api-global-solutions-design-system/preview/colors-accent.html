<!-- Card: Accent - Green -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:#fff;color:var(--fg)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
.chip{height:78px;display:flex;align-items:flex-end;padding:10px;font-size:11px;font-weight:600;color:#0B1428;letter-spacing:.02em}
.meta{padding:8px 10px;background:#fff;font-size:11px;line-height:1.35}
.meta b{display:block;color:var(--fg);font-weight:700;font-size:12px}
.meta span{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10.5px}
h4{margin:0 0 10px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-700)}
</style></head><body>
<h4>Accent — API Green Ramp</h4>
<div class="row">
  <div class="sw"><div class="chip" style="background:#DCF1C4">100</div><div class="meta"><b>Green 100</b><span>#DCF1C4</span></div></div>
  <div class="sw"><div class="chip" style="background:#9CD668">300</div><div class="meta"><b>Green 300</b><span>#9CD668</span></div></div>
  <div class="sw"><div class="chip" style="background:#78BC43">500 ● Brand</div><div class="meta"><b>Green 500</b><span>#78BC43</span></div></div>
  <div class="sw"><div class="chip" style="background:#4A8524;color:#fff">700</div><div class="meta"><b>Green 700</b><span>#4A8524</span></div></div>
  <div class="sw"><div class="chip" style="background:#244611;color:#fff">900</div><div class="meta"><b>Green 900</b><span>#244611</span></div></div>
</div>
</body></html>
